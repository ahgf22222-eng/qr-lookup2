<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>業務窗口查詢</title>
<script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
<script>
  // Fallback: if unpkg failed to load jsQR, try another CDN
  window.addEventListener('load', function(){
    if (typeof jsQR === 'undefined') {
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js';
      document.head.appendChild(s);
    }
  });
</script>
<style>
  :root{
    --ink:#1c2b2d;
    --paper:#f6f3ec;
    --line:#dcd5c6;
    --accent:#c1502e;
    --accent-dim:#e9d8cf;
    --mono: 'SF Mono', 'Roboto Mono', monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system, "PingFang TC", "Noto Sans TC", system-ui, sans-serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:18px 14px 40px;
  }
  header{
    width:100%; max-width:480px;
    margin-bottom:14px;
  }
  h1{
    font-size:1.3rem;
    margin:0 0 4px;
    letter-spacing:.02em;
  }
  .sub{
    font-size:.8rem;
    color:#6f6a5e;
  }
  .card{
    width:100%; max-width:480px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px;
    margin-bottom:14px;
    box-shadow:0 1px 2px rgba(0,0,0,.03);
  }
  .tabs{
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }
  .tab{
    flex:1;
    padding:9px 0;
    text-align:center;
    border:1px solid var(--line);
    border-radius:10px;
    background:#fff;
    font-size:.92rem;
    cursor:pointer;
    transition:.15s;
  }
  .tab.active{
    background:var(--ink);
    color:#fff;
    border-color:var(--ink);
  }
  .panel{display:none;}
  .panel.active{display:block;}

  #video-wrap{
    position:relative;
    width:100%;
    border-radius:12px;
    overflow:hidden;
    background:#000;
    aspect-ratio:1/1;
  }
  video{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }
  .scan-frame{
    position:absolute;
    inset:18%;
    border:2px solid var(--accent);
    border-radius:10px;
    pointer-events:none;
    box-shadow:0 0 0 999px rgba(0,0,0,.28);
  }
  .scan-status{
    margin-top:10px;
    font-size:.85rem;
    color:#6f6a5e;
    text-align:center;
  }
  .scan-btn{
    margin-top:12px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--ink);
    color:#fff;
    font-size:1rem;
    cursor:pointer;
  }
  .scan-btn:disabled{opacity:.5;}

  input[type=search]{
    width:100%;
    padding:11px 12px;
    font-size:1rem;
    border:1px solid var(--line);
    border-radius:10px;
    background:var(--paper);
    color:var(--ink);
  }
  input[type=search]:focus{outline:2px solid var(--ink); outline-offset:1px;}

  .result{
    margin-top:14px;
    border-top:1px solid var(--line);
    padding-top:14px;
  }
  .result-name{
    font-size:1.15rem;
    font-weight:700;
    margin-bottom:8px;
  }
  .result-row{
    display:flex;
    justify-content:space-between;
    padding:7px 0;
    border-bottom:1px solid #efe9da;
    font-size:.95rem;
  }
  .result-row:last-child{border-bottom:none;}
  .result-row .label{color:#8a8472; font-size:.85rem;}
  .result-row .value{font-weight:600; text-align:right;}
  .rep-highlight{
    background:var(--accent-dim);
    border-radius:8px;
    padding:10px 12px;
    margin-top:4px;
  }
  .rep-highlight .value{color:var(--accent); font-size:1.1rem;}

  .empty, .error{
    margin-top:14px;
    padding:12px 14px;
    border-radius:10px;
    font-size:.9rem;
    background:#f1ece0;
    color:#6f6a5e;
  }
  .error{background:#fbe4de; color:var(--accent);}

  .list{
    margin-top:10px;
    max-height:300px;
    overflow-y:auto;
  }
  .list-item{
    padding:10px 4px;
    border-bottom:1px solid #efe9da;
    cursor:pointer;
    font-size:.95rem;
  }
  .list-item:hover{background:#faf8f2;}
  .list-item .li-name{font-weight:600;}
  .list-item .li-meta{font-size:.8rem; color:#8a8472; margin-top:2px;}

  .count{
    font-size:.78rem;
    color:#aba691;
    text-align:right;
    margin-top:6px;
  }
</style>
</head>
<body>
<header>
  <h1>商家業務窗口查詢</h1>
  <div class="sub">掃描立牌 QR code，或輸入商家名稱查詢對應業務</div>
</header>

<div class="card">
  <div class="tabs">
    <div class="tab active" data-tab="scan">掃描 QR code</div>
    <div class="tab" data-tab="search">搜尋商家</div>
  </div>

  <div class="panel active" id="panel-scan">
    <div id="video-wrap">
      <video id="video" playsinline muted></video>
      <div class="scan-frame"></div>
    </div>
    <button class="scan-btn" id="cam-btn">開啟相機</button>
    <div class="scan-status" id="scan-status">點擊「開啟相機」開始掃描</div>
    <div id="scan-result"></div>
  </div>

  <div class="panel" id="panel-search">
    <input type="search" id="search-input" placeholder="輸入商家名稱關鍵字…" autocomplete="off">
    <div class="count" id="search-count"></div>
    <div class="list" id="search-list"></div>
    <div id="search-result"></div>
  </div>
</div>

<script>
const DATA = [{"code": "81600270", "name": "高生車業行", "dept": "業務一部", "rep": "10609 許喬棟", "area": "台北"}, {"code": "11425406", "name": "金榮車行", "dept": "業務一部", "rep": "10609 許喬棟", "area": "台北"}, {"code": "01506246", "name": "天貴機車行", "dept": "業務一部", "rep": "10609 許喬棟", "area": "台北"}, {"code": "42342991", "name": "春崇車業", "dept": "業務一部", "rep": "10609 許喬棟", "area": "台北"}, {"code": "01616715", "name": "大慶機車材料", "dept": "業務一部", "rep": "10609 許喬棟", "area": "台北"}, {"code": "01670549", "name": "名翔機車行", "dept": "業務一部", "rep": "10609 許喬棟", "area": "台北"}, {"code": "80986228", "name": "盟鑫機車行", "dept": "業務一部", "rep": "10609 許喬棟", "area": "台北"}, {"code": "98853024", "name": "一統車業行", "dept": "業務三部", "rep": "16788冒思綺", "area": "台中"}, {"code": "98853024_1C10044-1", "name": "一統車業行", "dept": "業務三部", "rep": "16788冒思綺", "area": "台中"}, {"code": "55867391", "name": "大中機車行", "dept": "業務三部", "rep": "16788冒思綺", "area": "台中"}, {"code": "55867391_1C10033-1", "name": "大中機車行", "dept": "業務三部", "rep": "16788冒思綺", "area": "台中"}, {"code": "99884664", "name": "大晉機車社", "dept": "業務三部", "rep": "16788冒思綺", "area": "台中"}, {"code": "99884664_1C10059-1", "name": "大晉機車社", "dept": "業務三部", "rep": "16788冒思綺", "area": "台中"}, {"code": "14600265", "name": "大勝機車行", "dept": "業務三部", "rep": "14954賴晏璋", "area": "台中"}, {"code": "97595891", "name": "大勝機車行", "dept": "業務三部", "rep": "20548林盈辰", "area": "台中"}, {"code": "98699944", "name": "文政機車行", "dept": "業務三部", "rep": "16788冒思綺", "area": "台中"}];

// build lookup maps
const byCode = new Map();
DATA.forEach(d => byCode.set(String(d.code).trim(), d));

function extractCode(text){
  // try to pull last path segment from a URL, fallback to raw text
  text = text.trim();
  try{
    const u = new URL(text);
    const parts = u.pathname.split('/').filter(Boolean);
    if(parts.length) return parts[parts.length-1];
  }catch(e){}
  const parts = text.split('/').filter(Boolean);
  return parts[parts.length-1] || text;
}

function renderResult(container, item, rawText){
  if(!item){
    container.innerHTML = `<div class="error">查無對應商家資料<br><span style="font-size:.8rem">掃描內容：${escapeHtml(rawText)}</span></div>`;
    return;
  }
  container.innerHTML = `
    <div class="result">
      <div class="result-name">${escapeHtml(item.name)}</div>
      <div class="rep-highlight result-row">
        <span class="label">業務窗口</span>
        <span class="value">${escapeHtml(item.rep || '-')}</span>
      </div>
      <div class="result-row">
        <span class="label">業務部門</span>
        <span class="value">${escapeHtml(item.dept || '-')}</span>
      </div>
      <div class="result-row">
        <span class="label">配送區域</span>
        <span class="value">${escapeHtml(item.area || '-')}</span>
      </div>
      <div class="result-row">
        <span class="label">店家編號</span>
        <span class="value" style="font-family:var(--mono); font-size:.85rem;">${escapeHtml(item.code)}</span>
      </div>
    </div>`;
}

function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// --- tabs ---
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+tab.dataset.tab).classList.add('active');
    if(tab.dataset.tab !== 'scan') stopCamera();
  });
});

// --- search ---
const searchInput = document.getElementById('search-input');
const searchList = document.getElementById('search-list');
const searchResult = document.getElementById('search-result');
const searchCount = document.getElementById('search-count');

searchInput.addEventListener('input', ()=>{
  const q = searchInput.value.trim();
  searchResult.innerHTML = '';
  if(!q){ searchList.innerHTML=''; searchCount.textContent=''; return; }
  const matches = DATA.filter(d => d.name.includes(q) || String(d.code).includes(q));
  searchCount.textContent = `共 ${matches.length} 筆`;
  if(matches.length === 0){
    searchList.innerHTML = `<div class="empty">查無符合「${escapeHtml(q)}」的商家</div>`;
    return;
  }
  searchList.innerHTML = matches.slice(0,50).map(d=>`
    <div class="list-item" data-code="${escapeHtml(d.code)}">
      <div class="li-name">${escapeHtml(d.name)}</div>
      <div class="li-meta">${escapeHtml(d.rep || '-')} · ${escapeHtml(d.dept || '-')} · ${escapeHtml(d.area || '-')}</div>
    </div>`).join('');
  searchList.querySelectorAll('.list-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      const item = byCode.get(el.dataset.code);
      renderResult(searchResult, item, item.name);
      searchList.innerHTML='';
      searchCount.textContent='';
      searchInput.value = item.name;
    });
  });
});

// --- camera scan ---
let stream = null;
let rafId = null;
const video = document.getElementById('video');
const camBtn = document.getElementById('cam-btn');
const scanStatus = document.getElementById('scan-status');
const scanResult = document.getElementById('scan-result');
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });

let lastScanned = '';
let lastScanTime = 0;

camBtn.addEventListener('click', ()=>{
  if(stream){ stopCamera(); return; }
  startCamera();
});

async function startCamera(){
  scanResult.innerHTML = '';
  scanStatus.textContent = '啟動相機中…';

  // wait briefly for jsQR to load if not yet available
  let waited = 0;
  while(typeof jsQR === 'undefined' && waited < 3000){
    await new Promise(r => setTimeout(r, 100));
    waited += 100;
  }
  if(typeof jsQR === 'undefined'){
    scanStatus.textContent = '掃描功能載入失敗，請檢查網路連線後重新整理頁面';
    return;
  }

  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }
    });
    video.srcObject = stream;
    await video.play();
    camBtn.textContent = '關閉相機';
    scanStatus.textContent = '請將 QR code 對準框內';
    tick();
  }catch(err){
    scanStatus.textContent = '無法開啟相機：' + err.message + '（請確認已允許相機權限，且使用 HTTPS 連線）';
  }
}

function stopCamera(){
  if(rafId) cancelAnimationFrame(rafId);
  rafId = null;
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
    stream = null;
  }
  camBtn.textContent = '開啟相機';
  scanStatus.textContent = '點擊「開啟相機」開始掃描';
}

function tick(){
  if(!stream) return;
  if(video.readyState === video.HAVE_ENOUGH_DATA){
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height);
    if(code && code.data){
      const now = Date.now();
      if(code.data !== lastScanned || now - lastScanTime > 2000){
        lastScanned = code.data;
        lastScanTime = now;
        handleScan(code.data);
      }
    }
  }
  rafId = requestAnimationFrame(tick);
}

function handleScan(text){
  const extracted = extractCode(text);
  const item = byCode.get(extracted);
  scanStatus.textContent = '掃描成功！';
  renderResult(scanResult, item, text);
  if(navigator.vibrate) navigator.vibrate(80);
}
</script>
</body>
</html>
